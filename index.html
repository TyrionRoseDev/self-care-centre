<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Quiet Ritual · Ritual</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23332751'/%3E%3Ccircle cx='50' cy='38' r='13' fill='none' stroke='%23DDCFEE' stroke-width='3'/%3E%3Cline x1='50' y1='51' x2='50' y2='78' stroke='%23DDCFEE' stroke-width='3' stroke-dasharray='2 6' stroke-linecap='round'/%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ritual">
<meta name="theme-color" content="#DCCFEE">
<style>
  :root{
    /*__PALETTE__*/
    --paper:#E9E3F0; --card:#F7F3FC; --blush:#DDD4EC; --line:#CFC4E2;
    --plum:#382C53; --plum-soft:#5E5080; --rose:#8E76BC; --ink:#2E2742;
    --muted:#867E9C; --clay:#9A5E84; --clay-bg:#E8D7E6;
    --ac-retinol:#7FA589; --ac-repair:#B383C2; --ac-bha:#7F94CC; --ac-sleep:#8470BE; --ac-calm:#84A8C0; --ac-session:#B06A96;
    --btn-bg:#473776; --btn-fg:#fff;
    --prompt-a:#473776; --prompt-b:#6A5A9C; --prompt-fg:#fff;
    --prompt-yes-bg:#fff; --prompt-yes-fg:#473776; --prompt-no-bg:rgba(255,255,255,.20); --prompt-no-fg:#fff;
    /*__END_PALETTE__*/
    --serif:ui-serif,"New York",Georgia,"Times New Roman",serif;
    --round:ui-rounded,"SF Pro Rounded",-apple-system,system-ui,sans-serif;
    --r:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    font-family:var(--round); background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding-bottom:calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 20px;}

  /* header */
  header{
    padding:calc(14px + env(safe-area-inset-top)) 20px 12px;
    display:flex;align-items:center;justify-content:space-between;
    max-width:560px;margin:0 auto;
  }
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .mark{width:26px;height:26px;flex:0 0 auto;}
  .brand b{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--plum);letter-spacing:.2px;}
  .gear{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    background:var(--card);color:var(--plum-soft);display:grid;place-items:center;
  }
  .gear svg{width:18px;height:18px;}

  /* nav */
  nav.seg{
    display:flex;gap:4px;background:var(--blush);border-radius:999px;padding:4px;margin:6px 0 0;
  }
  .segwrap{position:sticky;top:0;z-index:20;background:var(--paper);padding:2px 0 8px;}
  nav.seg button{
    flex:1;border:none;background:none;font-family:var(--round);font-weight:600;
    font-size:13.5px;color:var(--plum-soft);padding:9px 4px;border-radius:999px;
    transition:.18s;
  }
  nav.seg button.on{background:var(--card);color:var(--plum);box-shadow:0 2px 8px rgba(92,58,75,.12);}

  main{margin-top:18px;}
  .view{display:none;animation:rise .35s ease;}
  .view.on{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* hero */
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .hero h1{
    font-family:var(--serif);font-weight:600;font-size:34px;line-height:1.08;
    margin:6px 0 4px;color:var(--plum);letter-spacing:-.4px;
  }
  .hero .meta{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;flex-wrap:wrap;}
  .dayflag{display:inline-flex;align-items:center;gap:7px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ac);display:inline-block;}
  .microtag{
    font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--clay);background:var(--clay-bg);padding:3px 9px;border-radius:999px;
  }

  /* phase toggle */
  .phase{display:flex;gap:4px;background:var(--blush);border-radius:999px;padding:4px;margin:16px 0 4px;width:fit-content;}
  .phase button{
    border:none;background:none;font-family:var(--round);font-weight:600;font-size:13px;
    color:var(--plum-soft);padding:7px 18px;border-radius:999px;display:flex;align-items:center;gap:6px;
  }
  .phase button.on{background:var(--card);color:var(--plum);box-shadow:0 1px 5px rgba(92,58,75,.12);}

  /* card */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:20px 20px 22px;margin:16px 0;box-shadow:0 6px 22px rgba(92,58,75,.05);
  }
  .note{
    font-style:italic;color:var(--plum-soft);font-size:14px;line-height:1.5;
    border-left:2px solid var(--rose);padding-left:12px;margin:0 0 14px;
  }
  .warn{
    display:flex;gap:9px;align-items:flex-start;background:var(--clay-bg);color:var(--clay);
    border-radius:14px;padding:11px 14px;font-size:13.5px;font-weight:600;margin:14px 0 0;line-height:1.45;
  }
  .warn svg{width:17px;height:17px;flex:0 0 auto;margin-top:1px;}

  /* ritual rail — the signature */
  ol.rail{list-style:none;margin:4px 0 0;padding:0;position:relative;}
  ol.rail li{position:relative;padding:0 0 18px 34px;font-size:15.5px;line-height:1.5;color:var(--ink);}
  ol.rail li:last-child{padding-bottom:0;}
  ol.rail li::before{ /* the thread */
    content:"";position:absolute;left:9px;top:18px;bottom:-2px;width:2px;
    background:repeating-linear-gradient(var(--line) 0 3px,transparent 3px 9px);
  }
  ol.rail li:last-child::before{display:none;}
  ol.rail li::after{ /* the bead */
    content:"";position:absolute;left:3px;top:4px;width:14px;height:14px;border-radius:50%;
    background:var(--card);border:2px solid var(--rose);
  }
  ol.rail li.wait{font-family:var(--serif);font-style:italic;color:var(--plum);font-size:16px;}
  ol.rail li.wait::after{background:var(--plum);border-color:var(--plum);}
  ol.rail li .pill{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--clay);margin-left:4px;}

  .seclabel{
    font-family:var(--serif);font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--plum-soft);margin:22px 0 8px;display:flex;align-items:center;gap:10px;
  }
  .seclabel::after{content:"";flex:1;height:1px;background:var(--line);}
  .sec:first-of-type .seclabel{margin-top:4px;}

  /* week accordion */
  .acc{background:var(--card);border:1px solid var(--line);border-radius:16px;margin:11px 0;overflow:hidden;}
  .acc>button{
    width:100%;border:none;background:none;display:flex;align-items:center;gap:12px;
    padding:16px 18px;text-align:left;font-family:var(--round);cursor:pointer;
  }
  .acc .wd{font-family:var(--serif);font-size:13px;color:var(--muted);width:38px;flex:0 0 auto;font-weight:600;}
  .acc .th{flex:1;font-weight:600;font-size:16px;color:var(--plum);}
  .acc .dose{font-family:var(--serif);font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;flex:0 0 auto;}
  .acc .chev{color:var(--muted);transition:.2s;flex:0 0 auto;}
  .acc .chev svg{display:block;width:18px;height:18px;}
  .acc.open .chev{transform:rotate(180deg);}
  .acc .body{display:none;padding:0 18px 18px 18px;}
  .acc.open .body{display:block;}
  .acc.today{border-color:var(--rose);box-shadow:0 4px 16px rgba(197,138,152,.18);}
  .acc.today .wd::after{content:" · today";color:var(--rose);}

  .footnote{text-align:center;color:var(--muted);font-size:13px;font-style:italic;line-height:1.6;margin:22px 8px 8px;}
  .devicebadge{
    display:inline-flex;align-items:center;gap:8px;background:var(--blush);color:var(--plum);
    font-size:12.5px;font-weight:600;border-radius:999px;padding:7px 14px;margin:4px 0 6px;
  }

  /* settings */
  .field{margin:18px 0;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--plum-soft);letter-spacing:.03em;text-transform:uppercase;margin-bottom:7px;}
  .field input,.field select{
    width:100%;font-family:var(--round);font-size:16px;padding:13px 14px;border-radius:14px;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
  }
  .field .help{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.45;}
  .btn{
    width:100%;border:none;border-radius:14px;padding:15px;font-family:var(--round);font-weight:700;
    font-size:16px;background:var(--btn-bg);color:var(--btn-fg);margin-top:6px;
  }
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--clay);margin-top:12px;}
  .cyclestat{background:var(--blush);border-radius:16px;padding:16px 18px;font-size:14.5px;color:var(--plum);line-height:1.5;}
  .cyclestat b{font-family:var(--serif);}

  /* microneedling prompt */
  .prompt{
    background:linear-gradient(135deg,var(--prompt-a),var(--prompt-b));color:var(--prompt-fg);border-radius:var(--r);
    padding:18px 20px;margin:16px 0;box-shadow:0 8px 24px rgba(92,58,75,.22);
  }
  .prompt p{margin:0 0 4px;}
  .prompt .ttl{font-family:var(--serif);font-size:19px;font-weight:600;}
  .prompt .sub{font-size:13.5px;opacity:.85;margin-bottom:14px;}
  .prompt .row{display:flex;gap:10px;}
  .prompt .row button{flex:1;border:none;border-radius:12px;padding:12px;font-family:var(--round);font-weight:700;font-size:15px;}
  .prompt .yes{background:var(--prompt-yes-bg);color:var(--prompt-yes-fg);}
  .prompt .no{background:var(--prompt-no-bg);color:var(--prompt-no-fg);}

  /* setup / first run */
  .overlay{position:fixed;inset:0;background:rgba(58,46,51,.55);backdrop-filter:blur(4px);display:none;place-items:center;z-index:100;padding:20px;}
  .overlay.on{display:grid;}
  .sheet{background:var(--paper);border-radius:24px;padding:26px 24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .sheet h2{font-family:var(--serif);color:var(--plum);font-size:24px;margin:0 0 6px;}
  .sheet p{color:var(--plum-soft);font-size:14px;margin:0 0 18px;line-height:1.5;}

  /* ---- hub additions ---- */
  .subseg{display:flex;gap:4px;background:var(--blush);border-radius:999px;padding:4px;margin:14px 0 4px;width:fit-content;max-width:100%;}
  .subseg button{border:none;background:none;font-family:var(--round);font-weight:600;font-size:13px;color:var(--plum-soft);padding:8px 16px;border-radius:999px;}
  .subseg button.on{background:var(--card);color:var(--plum);box-shadow:0 1px 5px rgba(92,58,75,.12);}

  /* today blocks (the daily checklist) */
  .block{background:var(--card);border:1px solid var(--line);border-radius:16px;margin:12px 0;overflow:hidden;box-shadow:0 6px 20px rgba(92,58,75,.05);}
  .block.done{opacity:.72;}
  .bhead{display:flex;align-items:center;gap:12px;padding:14px 15px;cursor:pointer;}
  .bicon{width:32px;height:32px;border-radius:50%;background:var(--blush);display:grid;place-items:center;font-size:15px;flex:0 0 auto;}
  .btitle{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
  .btitle b{font-weight:600;font-size:15.5px;color:var(--plum);}
  .btitle small{font-size:12.5px;color:var(--muted);}
  .block.done .btitle b{text-decoration:line-through;text-decoration-color:var(--muted);}
  .bcheck{width:32px;height:32px;border-radius:50%;border:2px solid var(--line);color:transparent;display:grid;place-items:center;flex:0 0 auto;font-size:15px;font-weight:800;background:var(--card);transition:.15s;}
  .bcheck.on{background:var(--btn-bg);border-color:var(--btn-bg);color:var(--btn-fg);}
  .block .chev{color:var(--muted);transition:.2s;flex:0 0 auto;}
  .block .chev svg{display:block;width:18px;height:18px;}
  .block.open .chev{transform:rotate(180deg);}
  .bbody{display:none;padding:2px 16px 16px;}
  .block.open .bbody{display:block;}

  .movelist{list-style:none;margin:6px 0 0;padding:0;}
  .movelist li{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14.5px;color:var(--ink);}
  .movelist li:last-child{border-bottom:none;}
  .movelist .d{color:var(--muted);font-family:var(--serif);font-size:13px;white-space:nowrap;}
  .linkbtn{margin-top:12px;width:100%;border:none;border-radius:12px;padding:12px;font-family:var(--round);font-weight:700;font-size:14.5px;background:var(--blush);color:var(--plum);cursor:pointer;}

  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--blush);color:var(--plum);font-size:13px;font-weight:700;border-radius:999px;padding:5px 12px;}
  .restnote{color:var(--muted);font-size:14px;}

  /* tracker */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;}
  .stat .n{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--plum);line-height:1;font-variant-numeric:tabular-nums;}
  .stat .k{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
  .stat.big{grid-column:1/-1;background:linear-gradient(135deg,var(--prompt-a),var(--prompt-b));border:none;color:#fff;box-shadow:0 8px 24px rgba(92,58,75,.20);}
  .stat.big .n{color:#fff;font-size:40px;}
  .stat.big .k{color:#fff;opacity:.85;}
  .gridcal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:8px 0 2px;}
  .gridcal .cell{aspect-ratio:1;border-radius:8px;background:var(--blush);display:grid;place-items:center;font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .gridcal .cell.partial{background:var(--rose);color:#fff;opacity:.6;}
  .gridcal .cell.full{background:var(--btn-bg);color:#fff;opacity:1;}
  .gridcal .cell.today{outline:2px solid var(--clay);outline-offset:1px;}
  .badges{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
  .badge{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
  .badge .ic{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;background:var(--blush);color:var(--muted);font-size:16px;}
  .badge.earned .ic{background:var(--btn-bg);color:#fff;}
  .badge .bt{flex:1;}
  .badge .bt b{font-weight:600;font-size:15px;color:var(--plum);}
  .badge .bt small{display:block;font-size:12.5px;color:var(--muted);}
  .badge.locked{opacity:.72;}
  .badge .bt small.done{color:var(--clay);font-weight:700;}
  .badge .bar{height:5px;border-radius:999px;background:var(--blush);margin-top:8px;overflow:hidden;}
  .badge .bar i{display:block;height:100%;background:var(--rose);border-radius:999px;transition:width .4s ease;}
  .grouphead{font-family:var(--serif);font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--plum-soft);margin:22px 0 8px;display:flex;align-items:center;gap:10px;}
  .grouphead .cnt{font-family:var(--round);font-size:12px;color:var(--muted);font-weight:700;}
  .grouphead::after{content:"";flex:1;height:1px;background:var(--line);order:1;}

  .goals{background:linear-gradient(135deg,var(--prompt-a),var(--prompt-b));color:#fff;border-radius:var(--r);padding:18px 20px;margin:16px 0 2px;box-shadow:0 8px 24px rgba(92,58,75,.20);}
  .goals h3{font-family:var(--serif);font-weight:600;font-size:17px;margin:0 0 10px;}
  .goals ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  .goals li{display:flex;gap:10px;align-items:baseline;font-size:14.5px;line-height:1.4;}
  .goals li .rank{font-family:var(--serif);font-weight:600;opacity:.8;flex:0 0 auto;}
  .goals .mantra{margin:12px 0 0;font-size:13px;opacity:.9;font-style:italic;}

  .extras{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin:14px 0;box-shadow:0 6px 20px rgba(92,58,75,.05);}
  .extras .lab{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chiptog{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:8px 13px;font-family:var(--round);font-size:13.5px;font-weight:600;color:var(--plum-soft);cursor:pointer;user-select:none;}
  .chiptog .tick{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:9px;color:transparent;font-weight:800;}
  .chiptog.on{background:var(--btn-bg);color:var(--btn-fg);border-color:var(--btn-bg);}
  .chiptog.on .tick{border-color:var(--btn-fg);color:var(--btn-fg);}

  /* nightly check-in */
  .ck-row{display:flex;align-items:center;gap:10px;margin:12px 0;}
  .ck-row label{flex:0 0 56px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--plum-soft);}
  .ck-row input{flex:1;min-width:0;font-family:var(--round);font-size:16px;padding:11px 13px;border-radius:12px;border:1px solid var(--line);background:var(--paper);color:var(--ink);}
  .ck-row .ref{flex:0 0 auto;font-size:12px;color:var(--muted);font-style:italic;white-space:nowrap;}
  .ck-row .ref.glow{color:var(--rose);font-weight:700;font-style:normal;}
  .hearts{display:flex;gap:4px;flex:1;}
  .hearts button{border:none;background:none;font-size:24px;line-height:1;color:var(--line);cursor:pointer;padding:2px 4px;font-family:var(--round);}
  .hearts button.on{color:var(--rose);}
  .ck-status{font-size:13px;color:var(--muted);text-align:center;margin-top:10px;font-style:italic;}
  .ckrow{display:grid;grid-template-columns:44px 1fr 1fr 1.2fr;gap:8px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .ckrow:last-child{border-bottom:none;}
  .ckrow .d{font-family:var(--serif);font-size:13px;color:var(--muted);font-weight:600;}
  .ckrow .v{font-variant-numeric:tabular-nums;color:var(--ink);}
  .ckrow .v.dim{color:var(--muted);}
  .ckrow .f{color:var(--rose);letter-spacing:1px;}
  .ckrow.avg{border-top:1px solid var(--line);border-bottom:none;}
  .ckrow.avg .d,.ckrow.avg .v{color:var(--plum);font-weight:700;}
  .ckhist .ckrow{grid-template-columns:56px 1fr 1fr 1.2fr;}
  .ckmore{display:block;margin:10px auto 0;}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  
    /* Twilight — deeper dusk; card lifts off a saturated lilac-grey field */
    body{
      background:
        radial-gradient(130% 60% at 50% -8%, #DBCEED 0%, rgba(219,206,237,0) 58%),
        radial-gradient(120% 52% at 85% 4%, #E6D3E5 0%, rgba(230,211,229,0) 52%),
        var(--paper);
      background-attachment:fixed;
    }
    .brand b{letter-spacing:.3px;}
    nav.seg button.on,.phase button.on{box-shadow:0 2px 10px rgba(70,50,120,.18);}
    .card{
      background:linear-gradient(180deg,#FAF6FE 0%,#F4EFFB 100%);
      box-shadow:0 14px 38px rgba(60,42,110,.14);border-color:#DFD4EE;
    }
    ol.rail li::after{
      background:radial-gradient(circle at 34% 30%,#BCA6E4 0%,#8068BE 78%);
      border-color:transparent;box-shadow:0 1px 6px rgba(80,56,150,.40);
    }
    ol.rail li.wait::after{
      background:radial-gradient(circle at 34% 30%,#7860A6 0%,#473776 80%);
      box-shadow:0 1px 7px rgba(60,42,110,.55);
    }
    ol.rail li::before{background:repeating-linear-gradient(#CDBFE4 0 3px,transparent 3px 9px);}
    .note{border-left-color:var(--rose);}
    .acc.today{box-shadow:0 8px 24px rgba(90,60,160,.24);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="mark" viewBox="0 0 100 100" aria-hidden="true"><rect width="100" height="100" rx="24" fill="#332751"/><circle cx="50" cy="38" r="13" fill="none" stroke="#DDCFEE" stroke-width="3"/><line x1="50" y1="51" x2="50" y2="78" stroke="#DDCFEE" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round"/></svg>
    <b>Quiet Ritual</b>

/* ----------------------------------------------------------------------------
   Date helpers (all local time, day-granularity)
---------------------------------------------------------------------------- */
function startOfDay(d) { const x = new Date(d); x.setHours(0, 0, 0, 0); return x; }
function addDays(d, n) { const x = startOfDay(d); x.setDate(x.getDate() + n); return x; }
function mondayOf(d) { const x = startOfDay(d); const off = (x.getDay() + 6) % 7; return addDays(x, -off); }
function fridayOf(d) { return addDays(mondayOf(d), 4); }
function iso(d) {
  const x = startOfDay(d);
  return `${x.getFullYear()}-${String(x.getMonth() + 1).padStart(2, "0")}-${String(x.getDate()).padStart(2, "0")}`;
}
function fromIso(s) { const [y, m, dd] = s.split("-").map(Number); return new Date(y, m - 1, dd); }

/* ----------------------------------------------------------------------------
   Persisted cycle state
   { lastSession:'YYYY-MM-DD'(a Friday), interval:5, answers:{ mondayIso: 'yes'|'no' } }
---------------------------------------------------------------------------- */
const STORE_KEY = "skincare.cycle.v1";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || null; }
  catch (e) { return null; }
}
function saveState(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

function setupCycle(lastSessionDate, intervalWeeks) {
  saveState({ lastSession: iso(fridayOf(lastSessionDate)), interval: intervalWeeks, answers: {} });
}

/* Compute everything about "today" relative to the cycle. */
function computeCycle(now) {
  const today = startOfDay(now);
  const state = loadState();
  if (!state) return { configured: false, today };

  const thisMonday = mondayOf(today);
  const answers = state.answers || {};

  // Walk the predicted session forward, absorbing skips ("no") and any
  // fully-missed past weeks, until we land on the current candidate week.
  let target = addDays(fromIso(state.lastSession), state.interval * 7);
  let guard = 0;
  while (guard++ < 520) {
    const wkMon = mondayOf(target);
    const key = iso(wkMon);
    const weekEnd = addDays(wkMon, 6);
    if (answers[key] === "no") { target = addDays(target, 7); continue; }
    if (answers[key] !== "yes" && today > weekEnd) { target = addDays(target, 7); continue; }
    break;
  }
  const candidateFriday = fridayOf(target);
  const candidateMonday = mondayOf(target);

  const thisAnswer = answers[iso(thisMonday)];
  const isCandidateWeek = thisMonday.getTime() === candidateMonday.getTime();
  const microActive = thisAnswer === "yes";
  const needPrompt = isCandidateWeek && thisAnswer == null;

  const weeksUntil = Math.round((candidateFriday - today) / (7 * 864e5));

  return {
    configured: true, today, state,
    candidateFriday, candidateMonday,
    isCandidateWeek, microActive, needPrompt, weeksUntil,
  };
}

function answerWeek(now, yes) {
  const state = loadState(); if (!state) return;
  const thisMonday = iso(mondayOf(now));
  state.answers = state.answers || {};
  state.answers[thisMonday] = yes ? "yes" : "no";
  if (yes) state.lastSession = iso(fridayOf(now)); // this week's Friday becomes the new anchor
  saveState(state);
}

/* Resolve the routine to show for a given day. */
function routineFor(dayKey, microActive) {
  const set = microActive ? DATA.micro : DATA.week;
  return set[dayKey];
}

/* AM/PM by clock: morning before 12:00, else evening. */
function phaseNow(now) { return now.getHours() < 12 ? "am" : "pm"; }

/* Session key for a weekday, or null on a Rest day. */
function sessionForDay(dayKey) { return WORKOUT.schedule[dayKey] || null; }

/* ============================================================================
   COMPLETION LOG + TRACKER (streaks & achievements)
   ----------------------------------------------------------------------------
   Log shape: { done: { 'YYYY-MM-DD': { am:true, workout:true, pm:true, protein:true } } }
   Blocks per day: am + pm always; workout only on training days; protein is a
   daily bonus that never breaks a streak. A day is "complete" when its required
   blocks (am, pm, and workout if a training day) are all ticked.
   ============================================================================ */
const LOG_KEY = "ritual.log.v1";
function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY)) || { done: {} }; }
  catch (e) { return { done: {} }; }
}
function saveLog(l) { localStorage.setItem(LOG_KEY, JSON.stringify(l)); }

function isDone(dateIso, block) {
  const l = loadLog(); return !!(l.done[dateIso] && l.done[dateIso][block]);
}
function setDone(dateIso, block, val) {
  const l = loadLog();
  const day = l.done[dateIso] || (l.done[dateIso] = {});
  if (val) day[block] = true; else delete day[block];
  if (Object.keys(day).length === 0) delete l.done[dateIso];
  saveLog(l);
}
function toggleDone(dateIso, block) { const now = !isDone(dateIso, block); setDone(dateIso, block, now); return now; }

/* Required blocks for a date (protein excluded — it's a bonus). */
function requiredBlocks(dateIso) {
  const dayKey = DAY_KEYS[fromIso(dateIso).getDay()];
  const req = ["am", "pm"];
  if (sessionForDay(dayKey)) req.push("workout");
  return req;
}
function isCompleteDay(dateIso) {
  const l = loadLog(); const day = l.done[dateIso]; if (!day) return false;
  return requiredBlocks(dateIso).every(b => day[b]);
}

/* Current streak: consecutive complete days ending today (or yesterday if today
   isn't finished yet, so an unfinished today never reads as a broken streak). */
function currentStreak(now) {
  let d = startOfDay(now);
  if (!isCompleteDay(iso(d))) d = addDays(d, -1);
  let n = 0, guard = 0;
  while (guard++ < 1000 && isCompleteDay(iso(d))) { n++; d = addDays(d, -1); }
  return n;
}
function longestStreak() {
  const l = loadLog(); const keys = Object.keys(l.done).sort();
  if (!keys.length) return 0;
  let best = 0, run = 0, cursor = null;
  for (let d = fromIso(keys[0]); d <= fromIso(keys[keys.length - 1]); d = addDays(d, 1)) {
    if (isCompleteDay(iso(d))) { run++; best = Math.max(best, run); } else { run = 0; }
    cursor = d;
  }
  return best;
}
function countBlock(block) {
  const l = loadLog(); let n = 0;
  for (const k in l.done) if (l.done[k][block]) n++;
  return n;
}
function countCompleteDays() {
  const l = loadLog(); let n = 0;
  for (const k in l.done) if (isCompleteDay(k)) n++;
  return n;
}

/* Microneedling sessions the user has confirmed (from the skincare cycle). */
function microSessionsDone() {
  const st = loadState();
  if (!st || !st.answers) return 0;
  return Object.values(st.answers).filter(v => v === "yes").length;
}

/* Optional bonus habits — tracked, but never required for a streak. */
const EXTRA_BLOCKS = ["protein", "water", "vitamins", "move", "sleep"];

/* A "perfect day" = a complete day plus every bonus habit ticked. */
function isPerfectDay(dateIso) {
  if (!isCompleteDay(dateIso)) return false;
  const l = loadLog(); const day = l.done[dateIso] || {};
  return EXTRA_BLOCKS.every(b => day[b]);
}
function countPerfectDays() {
  const l = loadLog(); let n = 0;
  for (const k in l.done) if (isPerfectDay(k)) n++;
  return n;
}

/* ============================================================================
   CHECK-INS (nightly Steps / Sleep / Feel)
   ----------------------------------------------------------------------------
   Offline-first: entries live in a local cache and work with no server at all.
   With a CHECKIN_TOKEN pasted in Settings they also sync to /api/checkin, the
   same endpoint an Apple Shortcut / Health Auto Export bridge will POST to
   later (docs/adr/0003). Always optional — never part of a streak.
   ============================================================================ */
const CHECKIN_TOKEN_KEY = "ritual.checkin.token";
const CHECKIN_CACHE_KEY = "ritual.checkins.v1";
/* Gentle references only — a hint and a sparkle, never a red state. */
const CHECKIN_GENTLE = {
  stepsRef: "most days: ~7k",
  sleepRef: "aim: 7–9h",
  stepsInRange: s => s >= 6000,
  sleepInRange: h => h >= 7 && h <= 9.5,
};

function checkinToken() { return localStorage.getItem(CHECKIN_TOKEN_KEY) || ""; }
function setCheckinToken(t) {
  if (t) localStorage.setItem(CHECKIN_TOKEN_KEY, t.trim());
  else localStorage.removeItem(CHECKIN_TOKEN_KEY);
}
function loadCheckinCache() {
  try { return JSON.parse(localStorage.getItem(CHECKIN_CACHE_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveCheckinCache(all) { localStorage.setItem(CHECKIN_CACHE_KEY, JSON.stringify(all)); }
function getCheckin(dateIso) { return loadCheckinCache()[dateIso] || null; }

/* Save locally first (always works), then best-effort sync to the server. */
async function saveCheckin(dateIso, fields) {
  const all = loadCheckinCache();
  all[dateIso] = { ...(all[dateIso] || {}), ...fields };
  saveCheckinCache(all);
  if (!checkinToken()) return { ok: true, synced: false };
  try {
    const res = await fetch((PUSH_CONFIG.apiBase || "").replace(/\/$/, "") + "/api/checkin", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Checkin-Token": checkinToken() },
      body: JSON.stringify({ date: dateIso, ...fields }),
    });
    return { ok: true, synced: res.ok };
  } catch (e) { return { ok: true, synced: false }; }
}
/* Pull the server's copy into the cache (server wins per date). */
async function refreshCheckins(days = 60) {
  if (!checkinToken()) return false;
  try {
    const res = await fetch((PUSH_CONFIG.apiBase || "").replace(/\/$/, "") + "/api/checkins?days=" + days, {
      headers: { "X-Checkin-Token": checkinToken() },
    });
    if (!res.ok) return false;
    const j = await res.json();
    const all = loadCheckinCache();
    for (const k in (j.checkins || {})) all[k] = { ...(all[k] || {}), ...j.checkins[k] };
    saveCheckinCache(all);
    return true;
  } catch (e) { return false; }
}

function countCheckins() { return Object.keys(loadCheckinCache()).length; }
function longestCheckinRun() {
  const keys = Object.keys(loadCheckinCache()).sort();
  if (!keys.length) return 0;
  let best = 1, run = 1;
  for (let i = 1; i < keys.length; i++) {
    if (fromIso(keys[i]) - fromIso(keys[i - 1]) === 86400000) { run++; best = Math.max(best, run); }
    else run = 1;
  }
  return best;
}

function trackerStats(now) {
  return {
    checkins: countCheckins(),
    streak: currentStreak(now),
    longest: longestStreak(),
    workouts: countBlock("workout"),
    protein: countBlock("protein"),
    completeDays: countCompleteDays(),
    am: countBlock("am"),
    pm: countBlock("pm"),
    micro: microSessionsDone(),
    water: countBlock("water"),
    vitamins: countBlock("vitamins"),
    move: countBlock("move"),
    sleep: countBlock("sleep"),
    perfect: countPerfectDays(),
  };
}

/* The Check-in strip: steps · sleep · feel per night + averages, 7 or 30 nights.
   Gentle by design — a missing night is just a quiet dash, never a red mark. */
function checkinStripHTML(nights = 7){
  const fmtSteps = s => s>=1000 ? (Math.round(s/100)/10)+"k" : String(s);
  let rows = "", stepSum=0, stepN=0, slpSum=0, slpN=0, any=false;
  for(let i=nights-1;i>=0;i--){
    const d = addDays(startOfDay(now), -i);
    const di = iso(d);
    const c = getCheckin(di) || {};
    if(nights>7 && c.steps==null && c.sleepHours==null && c.feel==null && i>0) continue;
    if(c.steps!=null||c.sleepHours!=null||c.feel!=null) any=true;
    if(c.steps!=null){ stepSum+=c.steps; stepN++; }
    if(c.sleepHours!=null){ slpSum+=c.sleepHours; slpN++; }
    const hearts = c.feel!=null ? "♥".repeat(c.feel) : "";
    const label = nights>7
      ? d.toLocaleDateString(undefined,{day:"numeric",month:"short"})
      : DAY_KEYS[d.getDay()]+(i===0?" ·":"");
    rows += `<div class="ckrow">
      <span class="d">${label}</span>
      <span class="v ${c.steps!=null?"":"dim"}">${c.steps!=null?fmtSteps(c.steps):"—"}</span>
      <span class="v ${c.sleepHours!=null?"":"dim"}">${c.sleepHours!=null?c.sleepHours+"h":"—"}</span>
      <span class="f">${hearts}</span>
    </div>`;
  }
  if(!any) return `<p class="restnote" style="margin:2px 0">Nothing here yet — your first Check-in will appear tonight.</p>`;
  const avg = `<div class="ckrow avg">
    <span class="d">avg</span>
    <span class="v">${stepN?fmtSteps(Math.round(stepSum/stepN)):"—"}</span>
    <span class="v">${slpN?(Math.round(slpSum/slpN*10)/10)+"h":"—"}</span>
    <span class="f"></span>
  </div>`;
  return rows + avg;
}

/* ---------- push notifications ---------- */
function pushSupported(){
  return typeof navigator!=="undefined" && "serviceWorker" in navigator
    && typeof window!=="undefined" && "PushManager" in window && "Notification" in window;
}
function urlB64ToUint8Array(b64){
  const pad = "=".repeat((4 - b64.length % 4) % 4);
  const base = (b64 + pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw = atob(base);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
async function registerSW(){
  try { return await navigator.serviceWorker.register("sw.js"); }
  catch(e){ return null; }
}
function pushConfigured(){ return !!PUSH_CONFIG.vapidPublicKey; }
async function enablePush(){
  const card = $("#notif-card"); if(!card) return;
  if(!pushSupported()){ card.textContent = "This device can't do notifications here yet. On iPhone: Share → Add to Home Screen, then reopen the app from your Home Screen."; return; }
  if(!pushConfigured()){ card.textContent = "Reminders aren't switched on yet — the server needs its VAPID keys set (see DEPLOY.md)."; return; }
  card.textContent = "Asking for permission…";
  let perm;
  try { perm = await Notification.requestPermission(); } catch(e){ perm = "denied"; }
  if(perm!=="granted"){ card.textContent = "Notifications are blocked. Turn them on for this site in your phone/browser settings, then try again."; return; }
  const reg = await registerSW();
  if(!reg){ card.textContent = "Couldn't register the reminder worker — this needs the app served over https (your Coolify domain)."; return; }
  try {
    await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8Array(PUSH_CONFIG.vapidPublicKey),
    });
    const res = await fetch((PUSH_CONFIG.apiBase || "").replace(/\/$/,"") + "/api/subscribe", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ subscription: sub, tz: Intl.DateTimeFormat().resolvedOptions().timeZone }),
    });
    if(!res.ok) throw new Error("server " + res.status);
    localStorage.setItem("ritual.push.on","1");
    updateNotifCard();
  } catch(e){ card.textContent = "Couldn't subscribe (" + e.message + "). Try again once the push-service is running."; }
}
function updateNotifCard(){
  const card = $("#notif-card"), btn = $("#notif-enable"); if(!card) return;
  if(!pushSupported()){ card.textContent = "On iPhone, add this app to your Home Screen (Share → Add to Home Screen) and reopen it to enable reminders."; if(btn) btn.style.display="none"; return; }
  if(!pushConfigured()){ card.textContent = "Reminders will switch on here once the push-service is deployed. The routine and tracker work fully without them."; if(btn) btn.style.display="none"; return; }
  if(btn) btn.style.display="";
  if(Notification.permission==="granted" && localStorage.getItem("ritual.push.on")){
    card.textContent = "Reminders are on — a nudge for each Tue/Thu/Sun workout and your morning & evening skincare.";
    if(btn) btn.textContent = "Re-subscribe this device";
  } else {
    card.textContent = "Get a gentle nudge for your Tue/Thu/Sun workouts and your morning & evening skincare.";
    if(btn) btn.textContent = "Turn on reminders";
  }
}

function renderCurrent(){
  if(view==="today") renderToday();
  else if(view==="skincare") renderSkincare();
  else if(view==="workout") renderWorkout();
  else if(view==="progress") renderProgress();
  else if(view==="settings") renderSettings();
}
function setView(v){
  view = v;
  document.querySelectorAll(".view").forEach(el=>el.classList.remove("on"));
  $("#v-"+v).classList.add("on");
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("on", b.dataset.v===v));
  renderCurrent();
  window.scrollTo({top:0,behavior:"auto"});
}

/* ---------- events ---------- */
$("#nav").addEventListener("click", e=>{ const b=e.target.closest("button"); if(b) setView(b.dataset.v); });
$("#gear").addEventListener("click", ()=>setView("settings"));

document.body.addEventListener("click", e=>{
  // mark a Today block done
  const chk = e.target.closest("[data-doneblock]");
  if(chk){ toggleDone(iso(now), chk.dataset.doneblock); renderToday(); return; }
  // expand/collapse a Today block
  const bt = e.target.closest("[data-blocktoggle]");
  if(bt){ bt.closest(".block").classList.toggle("open"); return; }
  // jump into the Workout tab at a given session
  const ow = e.target.closest("[data-openworkout]");
  if(ow){ workoutTab = ow.dataset.openworkout; setView("workout"); return; }
  // workout sub-tabs
  const wt = e.target.closest("[data-wt]");
  if(wt){ workoutTab = wt.dataset.wt; renderWorkout(); window.scrollTo({top:0,behavior:"auto"}); return; }
  // skincare sub-tabs
  const stb = e.target.closest("[data-st]");
  if(stb){ skinTab = stb.dataset.st; renderSkincare(); return; }
  // accordions (week + workout moves)
  const tog = e.target.closest("[data-acctoggle]");
  if(tog){ tog.closest("[data-acc]").classList.toggle("open"); return; }
  // check-in hearts — toggled in place (a re-render would wipe typed numbers)
  const fv = e.target.closest("[data-feelv]");
  if(fv){ const v=parseInt(fv.dataset.feelv,10); ckFeel = ckFeel===v ? null : v; $("#ck-hearts").innerHTML = heartsHTML(ckFeel); return; }
  if(e.target.id==="ck-save"){ submitCheckin(); return; }
  if(e.target.id==="ck-history"){ ckNights = ckNights===7 ? 30 : 7; renderProgress(); return; }
  if(e.target.id==="ck-token-save"){
    setCheckinToken($("#ck-token").value);
    renderSettings();
    refreshCheckins().then(ok=>{ if(ok && view==="today") renderToday(); });
    return;
  }
  // microneedling prompt
  const act = e.target.closest("[data-act]");
  if(act){ answerWeek(now, act.dataset.act==="yes"); renderToday(); return; }
  // settings save / reset
  if(e.target.id==="se-save"){
    const v=$("#se-date").value; if(!v)return;
    const st=loadState()||{answers:{}};
    st.lastSession=iso(fridayOf(fromIso(v)));
    st.interval=parseInt($("#se-int").value,10);
    st.answers=st.answers||{};
    saveState(st); renderSettings();
  }
  if(e.target.id==="se-reset"){
    localStorage.removeItem(STORE_KEY); openSetup(); renderSettings();
  }
  if(e.target.id==="notif-enable"){ enablePush(); return; }
});

/* setup / first run */
function openSetup(){ $("#su-date").value=""; $("#setup").classList.add("on"); }
$("#su-save").addEventListener("click", ()=>{
  const v=$("#su-date").value; if(!v){$("#su-date").focus();return;}
  setupCycle(fromIso(v), parseInt($("#su-int").value,10));
  $("#setup").classList.remove("on"); renderCurrent();
});
$("#su-skip").addEventListener("click", ()=>{
  saveState({lastSession:iso(fridayOf(new Date())),interval:99,answers:{}});
  $("#setup").classList.remove("on"); renderCurrent();
});

/* boot */
if(!loadState()) openSetup();
renderToday();
if(pushSupported() && pushConfigured()) registerSW();
/* pull server-side check-ins (e.g. from the Shortcut) into the local cache */
refreshCheckins().then(ok=>{ if(ok) renderCurrent(); });
</script>
</body>
